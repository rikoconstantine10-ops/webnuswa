<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nuswalab Bot Dashboard</title>
<style>
:root {
  --bg: #0f1117;
  --surface: #1a1d27;
  --surface2: #22263a;
  --border: #2e3347;
  --accent: #6c63ff;
  --accent2: #4ade80;
  --text: #e2e8f0;
  --text2: #94a3b8;
  --text3: #64748b;
  --danger: #f87171;
  --warn: #fbbf24;
  --bubble-in: #22263a;
  --bubble-out: #2d3561;
  --radius: 12px;
  --font: 'Inter', -apple-system, sans-serif;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: var(--font); background: var(--bg); color: var(--text); height: 100vh; display: flex; overflow: hidden; }

/* ── Sidebar ── */
#sidebar {
  width: 300px; min-width: 300px; background: var(--surface); border-right: 1px solid var(--border);
  display: flex; flex-direction: column; height: 100vh;
}
#sidebar-header { padding: 20px 16px 16px; border-bottom: 1px solid var(--border); }
#sidebar-header h1 { font-size: 18px; font-weight: 700; color: var(--text); letter-spacing: -0.3px; }
#sidebar-header h1 span { color: var(--accent); }
#sidebar-header p { font-size: 12px; color: var(--text3); margin-top: 2px; }

#sidebar-tabs { display: flex; padding: 12px 12px 0; gap: 4px; }
.stab { flex: 1; padding: 8px 4px; font-size: 12px; font-weight: 500; border: none; background: transparent;
  color: var(--text3); cursor: pointer; border-radius: 8px; transition: all .15s; }
.stab:hover { color: var(--text); background: var(--surface2); }
.stab.active { color: var(--accent); background: rgba(108,99,255,.12); }

#sidebar-content { flex: 1; overflow-y: auto; padding: 12px; }

/* Search */
#search-box { width: 100%; padding: 9px 12px; background: var(--surface2); border: 1px solid var(--border);
  border-radius: 8px; color: var(--text); font-size: 13px; outline: none; margin-bottom: 10px; }
#search-box::placeholder { color: var(--text3); }
#search-box:focus { border-color: var(--accent); }

/* Conversation item */
.conv-item { display: flex; align-items: center; gap: 10px; padding: 10px; border-radius: 10px;
  cursor: pointer; transition: background .12s; margin-bottom: 2px; }
.conv-item:hover { background: var(--surface2); }
.conv-item.active { background: rgba(108,99,255,.15); }
.conv-avatar { width: 42px; height: 42px; border-radius: 50%; background: var(--surface2);
  display: flex; align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0;
  border: 2px solid var(--border); overflow: hidden; }
.conv-avatar img { width: 100%; height: 100%; object-fit: cover; }
.conv-info { flex: 1; min-width: 0; }
.conv-name { font-size: 13px; font-weight: 600; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.conv-preview { font-size: 12px; color: var(--text3); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 2px; }
.conv-meta { display: flex; flex-direction: column; align-items: flex-end; gap: 4px; flex-shrink: 0; }
.conv-time { font-size: 11px; color: var(--text3); }
.badge-paused { font-size: 10px; background: rgba(251,191,36,.15); color: var(--warn); padding: 2px 6px; border-radius: 10px; }
.badge-ai { font-size: 10px; background: rgba(74,222,128,.15); color: var(--accent2); padding: 2px 6px; border-radius: 10px; }

/* WA Account items */
.wa-item { display: flex; align-items: center; gap: 10px; padding: 10px 8px; border-radius: 10px;
  border: 1px solid var(--border); margin-bottom: 8px; background: var(--surface2); }
.wa-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.wa-dot.connected { background: var(--accent2); box-shadow: 0 0 6px rgba(74,222,128,.5); }
.wa-dot.connecting { background: var(--warn); }
.wa-dot.disconnected, .wa-dot.stopped { background: var(--text3); }
.wa-info { flex: 1; min-width: 0; }
.wa-name { font-size: 13px; font-weight: 600; }
.wa-phone { font-size: 11px; color: var(--text3); }
.wa-actions { display: flex; gap: 6px; }

/* ── Main area ── */
#main { flex: 1; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

#topbar { padding: 0 20px; height: 60px; display: flex; align-items: center; justify-content: space-between;
  border-bottom: 1px solid var(--border); background: var(--surface); flex-shrink: 0; }
#topbar-left { display: flex; align-items: center; gap: 12px; }
#topbar-name { font-size: 15px; font-weight: 600; }
#topbar-sub { font-size: 12px; color: var(--text3); }
#topbar-right { display: flex; align-items: center; gap: 10px; }

/* Chat area */
#chat-area { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 6px; }
.msg-row { display: flex; }
.msg-row.out { justify-content: flex-end; }
.msg-row.in { justify-content: flex-start; }
.bubble { max-width: 70%; padding: 10px 14px; border-radius: 14px; font-size: 14px; line-height: 1.5; word-break: break-word; }
.bubble.out { background: var(--bubble-out); border-bottom-right-radius: 4px; color: var(--text); }
.bubble.in { background: var(--bubble-in); border-bottom-left-radius: 4px; color: var(--text); border: 1px solid var(--border); }
.msg-time { font-size: 10px; color: var(--text3); margin-top: 4px; text-align: right; }
.msg-time.in { text-align: left; }

/* Reply area */
#reply-area { padding: 12px 16px; border-top: 1px solid var(--border); background: var(--surface); display: flex; gap: 10px; align-items: flex-end; flex-shrink: 0; }
#reply-input { flex: 1; background: var(--surface2); border: 1px solid var(--border); border-radius: 10px;
  padding: 10px 14px; color: var(--text); font-size: 14px; resize: none; outline: none; min-height: 42px; max-height: 120px;
  font-family: var(--font); line-height: 1.4; }
#reply-input:focus { border-color: var(--accent); }
#reply-input::placeholder { color: var(--text3); }

/* Empty state */
#empty-state { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px; color: var(--text3); }
#empty-state .icon { font-size: 48px; opacity: .4; }
#empty-state p { font-size: 14px; }

/* ── Buttons ── */
.btn { padding: 8px 16px; border-radius: 8px; font-size: 13px; font-weight: 500; border: none; cursor: pointer; transition: all .15s; }
.btn-primary { background: var(--accent); color: #fff; }
.btn-primary:hover { background: #5a52e0; }
.btn-ghost { background: transparent; color: var(--text2); border: 1px solid var(--border); }
.btn-ghost:hover { background: var(--surface2); color: var(--text); }
.btn-danger { background: rgba(248,113,113,.15); color: var(--danger); border: 1px solid rgba(248,113,113,.3); }
.btn-danger:hover { background: rgba(248,113,113,.25); }
.btn-sm { padding: 5px 10px; font-size: 12px; }
.btn-icon { width: 34px; height: 34px; display: flex; align-items: center; justify-content: center; border-radius: 8px; font-size: 16px; border: none; cursor: pointer; background: transparent; color: var(--text2); transition: all .15s; }
.btn-icon:hover { background: var(--surface2); color: var(--text); }

/* ── Panels ── */
#panel-wa, #panel-kb, #panel-settings, #panel-media { display: none; }
#panel-wa.visible, #panel-kb.visible, #panel-settings.visible, #panel-media.visible { display: block; }

/* Right panel (KB, Settings, Media) */
#right-panel { width: 380px; min-width: 380px; background: var(--surface); border-left: 1px solid var(--border);
  display: none; flex-direction: column; height: 100vh; overflow: hidden; }
#right-panel.open { display: flex; }
#rp-header { padding: 16px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
#rp-header h2 { font-size: 15px; font-weight: 600; }
#rp-body { flex: 1; overflow-y: auto; padding: 16px; }

/* Form elements */
.form-group { margin-bottom: 14px; }
label { display: block; font-size: 12px; font-weight: 500; color: var(--text2); margin-bottom: 6px; }
input[type=text], input[type=password], textarea, select {
  width: 100%; padding: 9px 12px; background: var(--surface2); border: 1px solid var(--border);
  border-radius: 8px; color: var(--text); font-size: 13px; outline: none; font-family: var(--font); }
input:focus, textarea:focus, select:focus { border-color: var(--accent); }
input::placeholder, textarea::placeholder { color: var(--text3); }
textarea { resize: vertical; min-height: 80px; }

/* KB items */
.kb-item { background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; padding: 12px; margin-bottom: 8px; }
.kb-item-title { font-size: 13px; font-weight: 600; display: flex; justify-content: space-between; align-items: center; }
.kb-item-preview { font-size: 12px; color: var(--text3); margin-top: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.kb-toggle { font-size: 10px; padding: 3px 8px; border-radius: 6px; }
.kb-toggle.active { background: rgba(74,222,128,.15); color: var(--accent2); border: 1px solid rgba(74,222,128,.3); }
.kb-toggle.inactive { background: rgba(248,113,113,.12); color: var(--text3); border: 1px solid var(--border); }

/* Modal */
#modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.6); backdrop-filter: blur(4px); z-index: 100; display: none; align-items: center; justify-content: center; }
#modal-overlay.open { display: flex; }
.modal { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 24px; width: 460px; max-width: 90vw; }
.modal h3 { font-size: 16px; font-weight: 600; margin-bottom: 16px; }
.modal-footer { display: flex; justify-content: flex-end; gap: 8px; margin-top: 20px; }

/* QR Modal */
#qr-img { width: 220px; height: 220px; border-radius: 8px; background: #fff; padding: 10px; margin: 0 auto 12px; display: block; }
#pairing-code { text-align: center; font-size: 24px; font-weight: 700; letter-spacing: 4px; color: var(--accent); padding: 12px; background: var(--surface2); border-radius: 8px; margin-bottom: 12px; }

/* Toggle switch */
.toggle { position: relative; width: 40px; height: 22px; flex-shrink: 0; }
.toggle input { opacity: 0; width: 0; height: 0; }
.toggle-slider { position: absolute; cursor: pointer; inset: 0; background: var(--surface2); border: 1px solid var(--border); border-radius: 34px; transition: .2s; }
.toggle-slider:before { position: absolute; content: ""; height: 16px; width: 16px; left: 2px; bottom: 2px; background: var(--text3); border-radius: 50%; transition: .2s; }
.toggle input:checked + .toggle-slider { background: rgba(108,99,255,.3); border-color: var(--accent); }
.toggle input:checked + .toggle-slider:before { transform: translateX(18px); background: var(--accent); }

/* Login screen */
#login-screen { position: fixed; inset: 0; background: var(--bg); z-index: 200; display: flex; align-items: center; justify-content: center; }
.login-card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 36px; width: 360px; }
.login-card h2 { font-size: 22px; font-weight: 700; margin-bottom: 4px; }
.login-card p { color: var(--text3); font-size: 13px; margin-bottom: 24px; }
.login-card .logo { font-size: 32px; margin-bottom: 12px; }

/* Scrollbar */
::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }
::-webkit-scrollbar-thumb:hover { background: var(--text3); }

/* Media items */
.media-item { display: flex; align-items: center; gap: 10px; padding: 10px; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; margin-bottom: 8px; }
.media-thumb { width: 44px; height: 44px; border-radius: 6px; background: var(--surface); display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0; overflow: hidden; }
.media-thumb img { width: 100%; height: 100%; object-fit: cover; }
.media-info { flex: 1; min-width: 0; }
.media-name { font-size: 12px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.media-meta { font-size: 11px; color: var(--text3); margin-top: 2px; }

.divider { height: 1px; background: var(--border); margin: 16px 0; }
.tag { display: inline-block; padding: 3px 8px; border-radius: 6px; font-size: 11px; background: var(--surface2); border: 1px solid var(--border); color: var(--text2); margin-right: 4px; }
</style>
</head>
<body>

<!-- Login Screen -->
<div id="login-screen">
  <div class="login-card">
    <div class="logo">🤖</div>
    <h2>Nuswalab Bot</h2>
    <p>Login untuk mengakses dashboard</p>
    <div class="form-group"><label>Username</label><input type="text" id="login-user" value="admin"></div>
    <div class="form-group"><label>Password</label><input type="password" id="login-pass" placeholder="Password"></div>
    <div id="login-err" style="color:var(--danger);font-size:12px;margin-bottom:12px;display:none"></div>
    <button class="btn btn-primary" style="width:100%" onclick="doLogin()">Masuk</button>
  </div>
</div>

<!-- Sidebar -->
<div id="sidebar">
  <div id="sidebar-header">
    <h1>Nuswa<span>Bot</span></h1>
    <p id="sidebar-sub">Dashboard WA AI</p>
  </div>
  <div id="sidebar-tabs">
    <button class="stab active" onclick="switchTab('chats')" id="tab-chats">💬 Chat</button>
    <button class="stab" onclick="switchTab('wa')" id="tab-wa">📱 WA</button>
    <button class="stab" onclick="switchTab('kb')" id="tab-kb">📚 KB</button>
    <button class="stab" onclick="switchTab('settings')" id="tab-settings">⚙️</button>
  </div>
  <div id="sidebar-content">
    <!-- Chats panel -->
    <div id="panel-chats">
      <input type="text" id="search-box" placeholder="🔍 Cari kontak..." oninput="filterConvs(this.value)">
      <div id="conv-list"></div>
    </div>
    <!-- WA panel -->
    <div id="panel-wa">
      <button class="btn btn-primary" style="width:100%;margin-bottom:12px" onclick="openAddWA()">+ Tambah Akun WA</button>
      <div id="wa-list"></div>
    </div>
    <!-- KB preview -->
    <div id="panel-kb" style="display:none">
      <button class="btn btn-primary" style="width:100%;margin-bottom:12px" onclick="openAddKB()">+ Tambah Knowledge</button>
      <div id="kb-list-side"></div>
    </div>
    <!-- Settings preview -->
    <div id="panel-settings" style="display:none">
      <p style="font-size:12px;color:var(--text3);margin-bottom:12px">Konfigurasi bot & AI provider</p>
      <button class="btn btn-ghost" style="width:100%" onclick="openSettings()">Buka Pengaturan →</button>
    </div>
  </div>
  <!-- Stats bar -->
  <div style="padding:12px;border-top:1px solid var(--border);display:flex;gap:12px">
    <div style="flex:1;text-align:center">
      <div style="font-size:18px;font-weight:700;color:var(--accent)" id="stat-contacts">0</div>
      <div style="font-size:10px;color:var(--text3)">Kontak</div>
    </div>
    <div style="flex:1;text-align:center">
      <div style="font-size:18px;font-weight:700;color:var(--accent2)" id="stat-messages">0</div>
      <div style="font-size:10px;color:var(--text3)">Pesan</div>
    </div>
    <div style="flex:1;text-align:center">
      <div style="font-size:18px;font-weight:700;color:var(--warn)" id="stat-wa">0</div>
      <div style="font-size:10px;color:var(--text3)">Akun WA</div>
    </div>
  </div>
</div>

<!-- Main -->
<div id="main">
  <div id="topbar">
    <div id="topbar-left">
      <div id="topbar-avatar" style="width:36px;height:36px;border-radius:50%;background:var(--surface2);display:flex;align-items:center;justify-content:center;font-size:16px;border:1px solid var(--border)">👤</div>
      <div>
        <div id="topbar-name" style="color:var(--text3);font-size:14px">Pilih percakapan</div>
        <div id="topbar-sub">—</div>
      </div>
    </div>
    <div id="topbar-right">
      <div style="display:flex;align-items:center;gap:8px" id="ai-toggle-wrap" style="display:none">
        <span style="font-size:12px;color:var(--text3)">AI</span>
        <label class="toggle"><input type="checkbox" id="ai-toggle" onchange="toggleAI(this.checked)"><span class="toggle-slider"></span></label>
      </div>
      <button class="btn-icon" onclick="openRightPanel('media')" title="Media">🖼️</button>
      <button class="btn-icon" onclick="openRightPanel('kb')" title="Knowledge Base">📚</button>
      <button class="btn-icon" onclick="openRightPanel('settings')" title="Settings">⚙️</button>
    </div>
  </div>

  <div id="chat-area">
    <div id="empty-state">
      <div class="icon">💬</div>
      <p>Pilih percakapan untuk mulai</p>
    </div>
  </div>

  <div id="reply-area" style="display:none">
    <textarea id="reply-input" placeholder="Ketik pesan..." rows="1" onkeydown="onReplyKey(event)" oninput="autoResize(this)"></textarea>
    <button class="btn btn-primary" onclick="sendReply()">Kirim</button>
  </div>
</div>

<!-- Right Panel -->
<div id="right-panel">
  <div id="rp-header">
    <h2 id="rp-title">Panel</h2>
    <button class="btn-icon" onclick="closeRightPanel()">✕</button>
  </div>
  <div id="rp-body"></div>
</div>

<!-- Modal -->
<div id="modal-overlay" onclick="closeModal(event)">
  <div class="modal" id="modal-box" onclick="event.stopPropagation()">
    <h3 id="modal-title"></h3>
    <div id="modal-body"></div>
    <div class="modal-footer" id="modal-footer"></div>
  </div>
</div>

<script>
const BASE = '';
let TOKEN = localStorage.getItem('nuswabot_token') || '';
let currentPhone = null;
let currentSession = null;
let allConvs = [];
let pollTimer = null;
let qrPollTimer = null;

// ── Auth ──────────────────────────────────────────────────────────────────────
async function api(path, opts = {}) {
  const res = await fetch(BASE + '/api' + path, {
    ...opts,
    headers: { 'Authorization': 'Bearer ' + TOKEN, 'Content-Type': 'application/json', ...(opts.headers || {}) }
  });
  if (res.status === 401) { logout(); return null; }
  return res.json();
}

async function doLogin() {
  const u = document.getElementById('login-user').value;
  const p = document.getElementById('login-pass').value;
  const res = await fetch('/api/auth/login', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ username:u, password:p }) });
  const data = await res.json();
  if (data.token) {
    TOKEN = data.token;
    localStorage.setItem('nuswabot_token', TOKEN);
    document.getElementById('login-screen').style.display = 'none';
    init();
  } else {
    const err = document.getElementById('login-err');
    err.textContent = 'Username atau password salah';
    err.style.display = 'block';
  }
}

function logout() {
  TOKEN = '';
  localStorage.removeItem('nuswabot_token');
  location.reload();
}

document.getElementById('login-pass').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });

// ── Init ──────────────────────────────────────────────────────────────────────
async function init() {
  if (!TOKEN) return;
  document.getElementById('login-screen').style.display = 'none';
  await Promise.all([loadConvs(), loadStats(), loadWaAccounts()]);
  clearInterval(pollTimer);
  pollTimer = setInterval(() => { loadConvs(); loadStats(); loadWaAccounts(); }, 5000);
}

// ── Conversations ─────────────────────────────────────────────────────────────
async function loadConvs() {
  const data = await api('/conversations');
  if (!data) return;
  allConvs = data;
  renderConvs(allConvs);
}

function renderConvs(convs) {
  const el = document.getElementById('conv-list');
  if (!convs.length) { el.innerHTML = '<p style="color:var(--text3);font-size:12px;text-align:center;padding:20px">Belum ada percakapan</p>'; return; }
  el.innerHTML = convs.map(c => `
    <div class="conv-item ${c.phone === currentPhone ? 'active' : ''}" onclick="openChat('${c.phone}','${esc(c.name||c.phone)}','${esc(c.wa_session||'')}')">
      <div class="conv-avatar">${c.profile_pic ? `<img src="${c.profile_pic}" onerror="this.parentNode.innerHTML='👤'">` : '👤'}</div>
      <div class="conv-info">
        <div class="conv-name">${esc(c.name||c.phone)}</div>
        <div class="conv-preview">${esc((c.last_direction==='out'?'↗ ':'')+(c.last_message||''))}</div>
      </div>
      <div class="conv-meta">
        <div class="conv-time">${formatTime(c.last_message_at)}</div>
        ${c.bot_paused ? '<span class="badge-paused">Paused</span>' : '<span class="badge-ai">AI</span>'}
      </div>
    </div>
  `).join('');
}

function filterConvs(q) {
  const filtered = q ? allConvs.filter(c => (c.name||c.phone||'').toLowerCase().includes(q.toLowerCase())) : allConvs;
  renderConvs(filtered);
}

async function openChat(phone, name, session) {
  currentPhone = phone;
  currentSession = session;
  document.querySelectorAll('.conv-item').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.conv-item').forEach(el => { if (el.onclick.toString().includes(`'${phone}'`)) el.classList.add('active'); });

  document.getElementById('topbar-name').textContent = name;
  document.getElementById('topbar-sub').textContent = phone + (session ? ' · ' + session : '');
  document.getElementById('topbar-avatar').innerHTML = '👤';
  document.getElementById('ai-toggle-wrap').style.display = 'flex';

  const conv = allConvs.find(c => c.phone === phone);
  document.getElementById('ai-toggle').checked = !(conv?.bot_paused);

  document.getElementById('reply-area').style.display = 'flex';
  await loadMessages(phone);
}

async function loadMessages(phone) {
  const data = await api('/messages/' + encodeURIComponent(phone));
  if (!data) return;
  const area = document.getElementById('chat-area');
  document.getElementById('empty-state')?.remove();
  area.innerHTML = data.map(m => `
    <div class="msg-row ${m.direction === 'out' ? 'out' : 'in'}">
      <div>
        <div class="bubble ${m.direction === 'out' ? 'out' : 'in'}">${esc(m.body)}</div>
        <div class="msg-time ${m.direction==='in'?'in':''}">${formatTime(m.created_at)}</div>
      </div>
    </div>
  `).join('');
  area.scrollTop = area.scrollHeight;
}

async function sendReply() {
  const input = document.getElementById('reply-input');
  const msg = input.value.trim();
  if (!msg || !currentPhone || !currentSession) return;
  input.value = '';
  autoResize(input);
  const res = await api('/send', { method:'POST', body: JSON.stringify({ session_name: currentSession, phone: currentPhone, message: msg }) });
  if (res?.ok) await loadMessages(currentPhone);
}

function onReplyKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendReply(); }
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

async function toggleAI(checked) {
  if (!currentPhone) return;
  await api('/contacts/' + encodeURIComponent(currentPhone) + '/pause', { method:'POST', body: JSON.stringify({ paused: !checked }) });
  await loadConvs();
}

// ── Stats ─────────────────────────────────────────────────────────────────────
async function loadStats() {
  const data = await api('/stats');
  if (!data) return;
  document.getElementById('stat-contacts').textContent = data.contacts || 0;
  document.getElementById('stat-messages').textContent = data.messages || 0;
  document.getElementById('stat-wa').textContent = data.wa_accounts || 0;
}

// ── WA Accounts ──────────────────────────────────────────────────────────────
async function loadWaAccounts() {
  const data = await api('/wa');
  if (!data) return;
  const el = document.getElementById('wa-list');
  if (!data.length) { el.innerHTML = '<p style="color:var(--text3);font-size:12px;text-align:center;padding:20px">Belum ada akun WA</p>'; return; }
  el.innerHTML = data.map(a => `
    <div class="wa-item">
      <div class="wa-dot ${a.runtime_status||a.status}"></div>
      <div class="wa-info">
        <div class="wa-name">${esc(a.label||a.session_name)}</div>
        <div class="wa-phone">${a.phone || (a.runtime_status === 'connecting' ? 'Connecting...' : a.hasQr ? 'Scan QR' : 'Disconnected')}</div>
      </div>
      <div class="wa-actions">
        ${a.hasQr || a.runtime_status === 'connecting' ? `<button class="btn btn-sm btn-ghost" onclick="showQR('${a.session_name}')">QR</button>` : ''}
        <button class="btn btn-sm btn-danger" onclick="deleteWA('${a.session_name}')">✕</button>
      </div>
    </div>
  `).join('');
}

function openAddWA() {
  showModal('Tambah Akun WA', `
    <div class="form-group"><label>Nama Sesi</label><input type="text" id="wa-session-name" placeholder="Contoh: Toko-Utama"></div>
    <div class="form-group"><label>Label (opsional)</label><input type="text" id="wa-label" placeholder="Label akun"></div>
    <div class="form-group"><label>Pairing Phone (opsional)</label><input type="text" id="wa-pairing" placeholder="628xxxxxxxxxx"></div>
  `, [
    { label: 'Batal', cls: 'btn-ghost', action: 'closeModal()' },
    { label: 'Hubungkan', cls: 'btn-primary', action: 'addWA()' }
  ]);
}

async function addWA() {
  const session_name = document.getElementById('wa-session-name')?.value?.trim();
  const label = document.getElementById('wa-label')?.value?.trim();
  const pairing_phone = document.getElementById('wa-pairing')?.value?.trim();
  if (!session_name) return;
  closeModalEl();
  const res = await api('/wa', { method:'POST', body: JSON.stringify({ session_name, label, pairing_phone }) });
  if (res) { await loadWaAccounts(); setTimeout(() => showQR(session_name), 2000); }
}

async function deleteWA(session) {
  if (!confirm('Hapus akun WA ' + session + '?')) return;
  await api('/wa/' + encodeURIComponent(session), { method: 'DELETE' });
  await loadWaAccounts();
}

async function showQR(session) {
  showModal('Scan QR — ' + session, '<div style="text-align:center"><img id="qr-img" src="" alt="Loading QR..."><div id="pairing-code" style="display:none"></div><p style="color:var(--text3);font-size:12px">Buka WhatsApp > Linked Devices > Scan QR</p></div>',
    [{ label: 'Tutup', cls: 'btn-ghost', action: 'closeModalEl(); clearQRPoll()' }]);
  await pollQR(session);
  clearInterval(qrPollTimer);
  qrPollTimer = setInterval(() => pollQR(session), 3000);
}

async function pollQR(session) {
  const data = await api('/wa/' + encodeURIComponent(session) + '/qr');
  if (!data) return;
  const img = document.getElementById('qr-img');
  const pc = document.getElementById('pairing-code');
  if (!img) return;
  if (data.qr) { img.src = data.qr; img.style.display = 'block'; if(pc)pc.style.display='none'; }
  else if (data.pairingCode) { if(img)img.style.display='none'; if(pc){pc.style.display='block';pc.textContent=data.pairingCode;} }
  else { if(img) img.alt = 'Menunggu QR...'; }
}

function clearQRPoll() { clearInterval(qrPollTimer); }

// ── Tabs ──────────────────────────────────────────────────────────────────────
function switchTab(tab) {
  document.querySelectorAll('.stab').forEach(el => el.classList.remove('active'));
  document.getElementById('tab-' + tab)?.classList.add('active');
  document.getElementById('panel-chats').style.display = tab === 'chats' ? '' : 'none';
  document.getElementById('panel-wa').style.display = tab === 'wa' ? '' : 'none';
  document.getElementById('panel-kb').style.display = tab === 'kb' ? '' : 'none';
  document.getElementById('panel-settings').style.display = tab === 'settings' ? '' : 'none';
  if (tab === 'kb') loadKBSide();
}

// ── Knowledge Base ─────────────────────────────────────────────────────────
async function loadKBSide() {
  const data = await api('/knowledge');
  if (!data) return;
  const el = document.getElementById('kb-list-side');
  if (!data.length) { el.innerHTML = '<p style="color:var(--text3);font-size:12px;text-align:center;padding:16px">Belum ada knowledge</p>'; return; }
  el.innerHTML = data.map(k => `
    <div class="kb-item">
      <div class="kb-item-title">
        <span>${esc(k.title)}</span>
        <div style="display:flex;gap:6px;align-items:center">
          <button class="btn btn-sm kb-toggle ${k.active ? 'active' : 'inactive'}" onclick="toggleKB(${k.id},${k.active})">${k.active ? 'Aktif' : 'Nonaktif'}</button>
          <button class="btn-icon" style="width:24px;height:24px;font-size:12px" onclick="deleteKB(${k.id})">🗑</button>
        </div>
      </div>
      <div class="kb-item-preview">${esc(k.content)}</div>
    </div>
  `).join('');
}

function openAddKB() {
  showModal('Tambah Knowledge', `
    <div class="form-group"><label>Judul</label><input type="text" id="kb-title" placeholder="Contoh: Harga Produk"></div>
    <div class="form-group"><label>Konten</label><textarea id="kb-content" rows="6" placeholder="Isi knowledge base..."></textarea></div>
  `, [
    { label: 'Batal', cls: 'btn-ghost', action: 'closeModal()' },
    { label: 'Simpan', cls: 'btn-primary', action: 'saveKB()' }
  ]);
}

async function saveKB() {
  const title = document.getElementById('kb-title')?.value?.trim();
  const content = document.getElementById('kb-content')?.value?.trim();
  if (!title || !content) return;
  closeModalEl();
  await api('/knowledge', { method:'POST', body: JSON.stringify({ title, content }) });
  loadKBSide();
}

async function toggleKB(id, current) {
  await api('/knowledge/' + id, { method:'PUT', body: JSON.stringify({ active: current ? 0 : 1 }) });
  loadKBSide();
}

async function deleteKB(id) {
  if (!confirm('Hapus knowledge ini?')) return;
  await api('/knowledge/' + id, { method:'DELETE' });
  loadKBSide();
}

// ── Right Panel ───────────────────────────────────────────────────────────────
function openRightPanel(type) {
  const rp = document.getElementById('right-panel');
  rp.classList.add('open');
  if (type === 'kb') loadKBPanel();
  else if (type === 'settings') loadSettingsPanel();
  else if (type === 'media') loadMediaPanel();
}

function closeRightPanel() { document.getElementById('right-panel').classList.remove('open'); }

async function loadKBPanel() {
  document.getElementById('rp-title').textContent = '📚 Knowledge Base';
  const data = await api('/knowledge');
  if (!data) return;
  document.getElementById('rp-body').innerHTML = `
    <button class="btn btn-primary btn-sm" style="width:100%;margin-bottom:12px" onclick="openAddKB()">+ Tambah Knowledge</button>
    ${data.map(k => `
      <div class="kb-item">
        <div class="kb-item-title">
          <span style="font-size:12px">${esc(k.title)}</span>
          <div style="display:flex;gap:6px">
            <button class="btn btn-sm kb-toggle ${k.active?'active':'inactive'}" onclick="toggleKB(${k.id},${k.active});loadKBPanel()">${k.active?'ON':'OFF'}</button>
            <button class="btn-icon" style="width:22px;height:22px;font-size:11px" onclick="editKB(${k.id},'${esc(k.title)}','${esc(k.content).replace(/'/g,\'\\\'\')}')">✏️</button>
            <button class="btn-icon" style="width:22px;height:22px;font-size:11px" onclick="deleteKB(${k.id});loadKBPanel()">🗑</button>
          </div>
        </div>
        <div class="kb-item-preview" style="margin-top:6px;white-space:pre-wrap;font-size:11px;max-height:60px;overflow:hidden">${esc(k.content)}</div>
      </div>
    `).join('')}
  `;
}

function editKB(id, title, content) {
  showModal('Edit Knowledge', `
    <div class="form-group"><label>Judul</label><input type="text" id="kb-edit-title" value="${esc(title)}"></div>
    <div class="form-group"><label>Konten</label><textarea id="kb-edit-content" rows="8">${esc(content)}</textarea></div>
  `, [
    { label: 'Batal', cls:'btn-ghost', action:'closeModal()' },
    { label: 'Simpan', cls:'btn-primary', action:`saveKBEdit(${id})` }
  ]);
}

async function saveKBEdit(id) {
  const title = document.getElementById('kb-edit-title')?.value?.trim();
  const content = document.getElementById('kb-edit-content')?.value?.trim();
  if (!title || !content) return;
  closeModalEl();
  await api('/knowledge/'+id, { method:'PUT', body: JSON.stringify({ title, content }) });
  loadKBPanel();
}

async function loadSettingsPanel() {
  document.getElementById('rp-title').textContent = '⚙️ Pengaturan';
  const data = await api('/settings');
  if (!data) return;
  document.getElementById('rp-body').innerHTML = `
    <div class="form-group"><label>Bot Name</label><input type="text" id="set-bot_name" value="${esc(data.bot_name||'NuswaBot')}"></div>
    <div class="form-group"><label>System Prompt (Global)</label><textarea id="set-system_prompt" rows="6" placeholder="Kamu adalah asisten yang ramah...">${esc(data.system_prompt||'')}</textarea></div>
    <div class="divider"></div>
    <div class="form-group"><label>Sumopod API Key 1</label><input type="text" id="set-sumopod_key1" placeholder="sk-..." value="${esc(data.sumopod_key1||'')}"></div>
    <div class="form-group"><label>Sumopod API Key 2 (backup)</label><input type="text" id="set-sumopod_key2" placeholder="sk-..." value="${esc(data.sumopod_key2||'')}"></div>
    <div class="form-group"><label>Sumopod Model</label><input type="text" id="set-sumopod_model" value="${esc(data.sumopod_model||'gemini/gemini-2.5-flash')}"></div>
    <div class="form-group"><label>Sumopod Base URL</label><input type="text" id="set-sumopod_base_url" value="${esc(data.sumopod_base_url||'https://ai.sumopod.com')}"></div>
    <div class="divider"></div>
    <div class="form-group"><label>Anthropic API Key (fallback)</label><input type="text" id="set-anthropic_key" placeholder="sk-ant-..." value="${esc(data.anthropic_key||'')}"></div>
    <button class="btn btn-primary" style="width:100%;margin-top:8px" onclick="saveSettings()">Simpan Pengaturan</button>
  `;
}

async function saveSettings() {
  const fields = ['bot_name','system_prompt','sumopod_key1','sumopod_key2','sumopod_model','sumopod_base_url','anthropic_key'];
  const body = {};
  for (const f of fields) {
    const el = document.getElementById('set-'+f);
    if (el) body[f] = el.value;
  }
  const res = await api('/settings', { method:'POST', body: JSON.stringify(body) });
  if (res?.ok) showToast('Pengaturan disimpan ✓');
}

function openSettings() { openRightPanel('settings'); }

async function loadMediaPanel() {
  document.getElementById('rp-title').textContent = '🖼️ Media';
  const data = await api('/media');
  if (!data) return;
  const mediaIcons = { image:'🖼️', video:'🎬', audio:'🎵', application:'📄' };
  document.getElementById('rp-body').innerHTML = `
    <div style="margin-bottom:12px">
      <input type="file" id="media-file" style="display:none" onchange="uploadMedia(this)">
      <button class="btn btn-primary btn-sm" style="width:100%" onclick="document.getElementById('media-file').click()">+ Upload Media</button>
    </div>
    ${data.map(m => `
      <div class="media-item">
        <div class="media-thumb">${m.type?.startsWith('image') ? `<img src="/uploads/${m.filename}" onerror="this.parentNode.innerHTML='🖼️'">` : (mediaIcons[m.type]||'📄')}</div>
        <div class="media-info">
          <div class="media-name">${esc(m.original_name||m.filename)}</div>
          <div class="media-meta">${m.tags?`<span class="tag">${esc(m.tags)}</span>`:''}${m.ai_instruction?`<span style="color:var(--accent);font-size:10px">🤖 ${esc(m.ai_instruction.slice(0,30))}...</span>`:''}</div>
        </div>
        <button class="btn-icon" style="color:var(--danger)" onclick="deleteMedia(${m.id})">🗑</button>
      </div>
    `).join('') || '<p style="color:var(--text3);font-size:12px;text-align:center;padding:20px">Belum ada media</p>'}
  `;
}

async function uploadMedia(input) {
  const file = input.files[0];
  if (!file) return;
  const fd = new FormData();
  fd.append('file', file);
  const tags = prompt('Tags (pisah koma, opsional):', '') || '';
  const ai_instruction = prompt('Instruksi AI (kapan AI kirim media ini, opsional):', '') || '';
  fd.append('tags', tags);
  fd.append('ai_instruction', ai_instruction);
  const res = await fetch('/api/media', { method:'POST', headers:{ 'Authorization':'Bearer '+TOKEN }, body: fd });
  const data = await res.json();
  if (data.ok) { showToast('Media diupload ✓'); loadMediaPanel(); }
  input.value = '';
}

async function deleteMedia(id) {
  if (!confirm('Hapus media ini?')) return;
  await api('/media/'+id, { method:'DELETE' });
  loadMediaPanel();
}

// ── Modal ─────────────────────────────────────────────────────────────────────
function showModal(title, body, buttons) {
  document.getElementById('modal-title').textContent = title;
  document.getElementById('modal-body').innerHTML = body;
  document.getElementById('modal-footer').innerHTML = buttons.map(b => `<button class="btn ${b.cls}" onclick="${b.action}">${b.label}</button>`).join('');
  document.getElementById('modal-overlay').classList.add('open');
}

function closeModal(e) { if (e.target === document.getElementById('modal-overlay')) closeModalEl(); }
function closeModalEl() { document.getElementById('modal-overlay').classList.remove('open'); clearQRPoll(); }

// ── Toast ─────────────────────────────────────────────────────────────────────
function showToast(msg) {
  const t = document.createElement('div');
  t.style.cssText = 'position:fixed;bottom:24px;right:24px;background:var(--surface2);border:1px solid var(--border);padding:10px 18px;border-radius:8px;font-size:13px;color:var(--text);z-index:999;box-shadow:0 4px 20px rgba(0,0,0,.4)';
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 2500);
}

// ── Utils ─────────────────────────────────────────────────────────────────────
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }

function formatTime(ts) {
  if (!ts) return '';
  const d = new Date(ts);
  const now = new Date();
  if (d.toDateString() === now.toDateString()) return d.toLocaleTimeString('id-ID',{hour:'2-digit',minute:'2-digit'});
  const diff = now - d;
  if (diff < 7*86400000) return d.toLocaleDateString('id-ID',{weekday:'short'});
  return d.toLocaleDateString('id-ID',{day:'2-digit',month:'short'});
}

// ── Boot ──────────────────────────────────────────────────────────────────────
if (TOKEN) init();
</script>
</body>
</html>
