<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nuswalab Bot</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f0f2f5; color: #1a1a2e; height: 100vh; display: flex; overflow: hidden; }

/* Login */
#login-screen {
  position: fixed; inset: 0; background: #f0f2f5;
  display: flex; align-items: center; justify-content: center; z-index: 100;
}
.login-card {
  background: #fff; border-radius: 16px; padding: 40px 36px; width: 360px;
  box-shadow: 0 4px 24px rgba(0,0,0,.10);
}
.login-logo { font-size: 32px; margin-bottom: 8px; }
.login-card h2 { font-size: 22px; font-weight: 700; color: #1a1a2e; margin-bottom: 4px; }
.login-card p { font-size: 13px; color: #6b7280; margin-bottom: 28px; }
.form-field { margin-bottom: 16px; }
.form-field label { display: block; font-size: 12px; font-weight: 600; color: #374151; margin-bottom: 6px; }
.form-field input {
  width: 100%; padding: 10px 14px; border: 1.5px solid #e5e7eb; border-radius: 8px;
  font-size: 14px; color: #1a1a2e; background: #f9fafb; outline: none; transition: border .2s;
}
.form-field input:focus { border-color: #4f46e5; background: #fff; }
.btn-primary {
  width: 100%; padding: 11px; background: #4f46e5; color: #fff; border: none;
  border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; transition: background .2s;
}
.btn-primary:hover { background: #4338ca; }

/* Layout */
#app { display: flex; width: 100%; height: 100vh; }

/* Sidebar */
#sidebar {
  width: 300px; min-width: 300px; background: #fff;
  border-right: 1px solid #e5e7eb; display: flex; flex-direction: column;
}
.sidebar-header {
  padding: 18px 16px 14px; border-bottom: 1px solid #e5e7eb;
  display: flex; align-items: center; gap: 10px;
}
.sidebar-header .logo-icon { font-size: 22px; }
.sidebar-header h1 { font-size: 16px; font-weight: 700; color: #1a1a2e; }
.sidebar-header h1 span { color: #4f46e5; }
.sidebar-header p { font-size: 11px; color: #9ca3af; }

.sidebar-tabs { display: flex; padding: 10px 10px 0; gap: 2px; }
.stab {
  flex: 1; padding: 7px 4px; font-size: 11px; font-weight: 600;
  border: none; background: transparent; color: #6b7280; cursor: pointer;
  border-radius: 6px; transition: all .15s; letter-spacing: .2px;
}
.stab:hover { color: #1a1a2e; background: #f3f4f6; }
.stab.active { color: #4f46e5; background: #eef2ff; }

#sidebar-content { flex: 1; overflow-y: auto; padding: 10px; }

#search-box {
  width: 100%; padding: 8px 12px; background: #f3f4f6; border: 1.5px solid transparent;
  border-radius: 8px; font-size: 13px; color: #1a1a2e; outline: none; margin-bottom: 8px;
}
#search-box:focus { border-color: #4f46e5; background: #fff; }

/* Conv list */
.conv-item {
  display: flex; align-items: center; gap: 10px; padding: 10px; border-radius: 8px;
  cursor: pointer; transition: background .15s; margin-bottom: 2px;
}
.conv-item:hover { background: #f3f4f6; }
.conv-item.active { background: #eef2ff; }
.conv-avatar {
  width: 40px; height: 40px; border-radius: 50%; background: #4f46e5;
  display: flex; align-items: center; justify-content: center;
  font-size: 15px; font-weight: 700; color: #fff; flex-shrink: 0;
}
.conv-info { flex: 1; min-width: 0; }
.conv-name { font-size: 13px; font-weight: 600; color: #1a1a2e; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.conv-preview { font-size: 11px; color: #9ca3af; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 1px; }
.conv-meta { display: flex; flex-direction: column; align-items: flex-end; gap: 3px; }
.conv-time { font-size: 10px; color: #9ca3af; white-space: nowrap; }
.conv-badge { background: #4f46e5; color: #fff; font-size: 10px; font-weight: 700; padding: 1px 6px; border-radius: 10px; }
.conv-paused { font-size: 10px; color: #ef4444; font-weight: 600; }

/* WA list */
.wa-item {
  display: flex; align-items: center; gap: 10px; padding: 10px 12px;
  background: #f9fafb; border: 1px solid #e5e7eb; border-radius: 8px;
  margin-bottom: 6px;
}
.wa-dot { width: 8px; height: 8px; border-radius: 50%; background: #d1d5db; }
.wa-dot.connected { background: #10b981; }
.wa-dot.connecting { background: #f59e0b; }
.wa-name { font-size: 13px; font-weight: 600; color: #1a1a2e; }
.wa-phone { font-size: 11px; color: #6b7280; }
.wa-actions { margin-left: auto; display: flex; gap: 4px; }

/* KB list */
.kb-item {
  padding: 10px 12px; background: #f9fafb; border: 1px solid #e5e7eb;
  border-radius: 8px; margin-bottom: 6px;
}
.kb-item-header { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
.kb-item-title { font-size: 12px; font-weight: 600; color: #374151; }
.kb-item-preview { font-size: 11px; color: #6b7280; margin-top: 4px; white-space: pre-wrap; max-height: 40px; overflow: hidden; }
.kb-badge { font-size: 10px; font-weight: 700; padding: 2px 7px; border-radius: 10px; }
.kb-badge.on { background: #d1fae5; color: #059669; }
.kb-badge.off { background: #f3f4f6; color: #9ca3af; }

/* Buttons */
.btn { padding: 6px 12px; border: none; border-radius: 6px; font-size: 12px; font-weight: 600; cursor: pointer; transition: all .15s; }
.btn-sm { padding: 4px 8px; font-size: 11px; }
.btn-blue { background: #4f46e5; color: #fff; }
.btn-blue:hover { background: #4338ca; }
.btn-outline { background: #fff; color: #374151; border: 1.5px solid #e5e7eb; }
.btn-outline:hover { border-color: #4f46e5; color: #4f46e5; }
.btn-red { background: #fef2f2; color: #ef4444; }
.btn-red:hover { background: #fee2e2; }
.btn-icon { background: none; border: none; cursor: pointer; padding: 4px 6px; border-radius: 6px; font-size: 14px; transition: background .15s; }
.btn-icon:hover { background: #f3f4f6; }

/* Sidebar add button */
.sidebar-add { padding: 10px; border-top: 1px solid #e5e7eb; }

/* Stats bar */
.stats-bar { display: flex; gap: 6px; margin-bottom: 10px; }
.stat-card {
  flex: 1; background: #f9fafb; border: 1px solid #e5e7eb; border-radius: 8px;
  padding: 8px 6px; text-align: center;
}
.stat-n { font-size: 18px; font-weight: 700; color: #4f46e5; }
.stat-l { font-size: 10px; color: #6b7280; }

/* Main area */
#main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

/* Chat header */
#chat-header {
  display: flex; align-items: center; gap: 12px; padding: 14px 20px;
  background: #fff; border-bottom: 1px solid #e5e7eb;
}
#chat-avatar { width: 38px; height: 38px; border-radius: 50%; background: #4f46e5; display: flex; align-items: center; justify-content: center; font-size: 15px; font-weight: 700; color: #fff; }
#chat-name { font-size: 15px; font-weight: 700; color: #1a1a2e; }
#chat-phone { font-size: 12px; color: #9ca3af; }
.header-actions { margin-left: auto; display: flex; align-items: center; gap: 8px; }
.toggle-label { font-size: 12px; color: #6b7280; font-weight: 500; }
.toggle { position: relative; display: inline-block; width: 36px; height: 20px; }
.toggle input { opacity: 0; width: 0; height: 0; }
.toggle-slider {
  position: absolute; cursor: pointer; inset: 0; background: #d1d5db; border-radius: 20px; transition: .3s;
}
.toggle-slider:before { content: ''; position: absolute; height: 14px; width: 14px; left: 3px; bottom: 3px; background: #fff; border-radius: 50%; transition: .3s; }
input:checked + .toggle-slider { background: #4f46e5; }
input:checked + .toggle-slider:before { transform: translateX(16px); }

/* Empty state */
#empty-state {
  flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
  color: #9ca3af;
}
#empty-state .empty-icon { font-size: 48px; margin-bottom: 12px; }
#empty-state p { font-size: 14px; }

/* Messages */
#messages-area { flex: 1; overflow-y: auto; padding: 20px; background: #f0f2f5; }
.bubble-wrap { display: flex; margin-bottom: 12px; }
.bubble-wrap.out { justify-content: flex-end; }
.bubble {
  max-width: 65%; padding: 10px 14px; border-radius: 12px; font-size: 13px; line-height: 1.5;
  word-break: break-word; position: relative;
}
.bubble.in { background: #fff; color: #1a1a2e; border-bottom-left-radius: 3px; box-shadow: 0 1px 2px rgba(0,0,0,.06); }
.bubble.out { background: #4f46e5; color: #fff; border-bottom-right-radius: 3px; }
.bubble-time { font-size: 10px; margin-top: 4px; opacity: .6; text-align: right; }

/* Input */
#input-area {
  display: flex; align-items: flex-end; gap: 10px; padding: 14px 20px;
  background: #fff; border-top: 1px solid #e5e7eb;
}
#msg-input {
  flex: 1; padding: 10px 14px; background: #f3f4f6; border: 1.5px solid transparent;
  border-radius: 10px; font-size: 13px; resize: none; outline: none; max-height: 120px;
  font-family: inherit; line-height: 1.5; transition: border .2s;
}
#msg-input:focus { border-color: #4f46e5; background: #fff; }
#send-btn {
  width: 38px; height: 38px; background: #4f46e5; color: #fff; border: none;
  border-radius: 50%; cursor: pointer; font-size: 16px; display: flex; align-items: center; justify-content: center;
  transition: background .2s; flex-shrink: 0;
}
#send-btn:hover { background: #4338ca; }

/* Right panel */
#right-panel {
  width: 340px; min-width: 340px; background: #fff; border-left: 1px solid #e5e7eb;
  display: none; flex-direction: column; overflow-y: auto;
}
#right-panel.open { display: flex; }
.panel-header { padding: 16px 16px 14px; border-bottom: 1px solid #e5e7eb; display: flex; align-items: center; justify-content: space-between; }
.panel-header h3 { font-size: 14px; font-weight: 700; color: #1a1a2e; }
.panel-body { padding: 16px; flex: 1; }

/* Forms */
.form-group { margin-bottom: 14px; }
.form-group label { display: block; font-size: 12px; font-weight: 600; color: #374151; margin-bottom: 5px; }
.form-group input, .form-group textarea, .form-group select {
  width: 100%; padding: 9px 12px; background: #f9fafb; border: 1.5px solid #e5e7eb;
  border-radius: 8px; font-size: 13px; color: #1a1a2e; outline: none; font-family: inherit; transition: border .2s;
}
.form-group input:focus, .form-group textarea:focus { border-color: #4f46e5; background: #fff; }
.form-group textarea { resize: vertical; min-height: 80px; }
.form-actions { display: flex; gap: 8px; justify-content: flex-end; }

/* Media */
.media-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.media-card {
  background: #f9fafb; border: 1px solid #e5e7eb; border-radius: 8px; overflow: hidden; position: relative;
}
.media-thumb { width: 100%; height: 80px; object-fit: cover; display: block; background: #e5e7eb; }
.media-info { padding: 6px 8px; }
.media-name { font-size: 11px; font-weight: 600; color: #374151; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.media-delete { position: absolute; top: 4px; right: 4px; background: rgba(255,255,255,.9); border: none; border-radius: 4px; cursor: pointer; padding: 2px 5px; font-size: 12px; }

/* QR modal */
#qr-modal {
  display: none; position: fixed; inset: 0; background: rgba(0,0,0,.4); z-index: 200;
  align-items: center; justify-content: center;
}
#qr-modal.open { display: flex; }
.qr-card {
  background: #fff; border-radius: 16px; padding: 28px; text-align: center; width: 320px;
  box-shadow: 0 8px 32px rgba(0,0,0,.15);
}
.qr-card h3 { font-size: 16px; font-weight: 700; margin-bottom: 4px; color: #1a1a2e; }
.qr-card p { font-size: 12px; color: #6b7280; margin-bottom: 16px; }
#qr-img { width: 220px; height: 220px; border-radius: 8px; border: 1px solid #e5e7eb; }
#pairing-code-box { font-size: 24px; font-weight: 800; letter-spacing: 4px; color: #4f46e5; margin: 12px 0; }

/* Modal */
#modal-overlay {
  display: none; position: fixed; inset: 0; background: rgba(0,0,0,.4); z-index: 200;
  align-items: center; justify-content: center;
}
#modal-overlay.open { display: flex; }
.modal-card { background: #fff; border-radius: 14px; padding: 24px; min-width: 340px; max-width: 500px; width: 90%; box-shadow: 0 8px 32px rgba(0,0,0,.15); }
.modal-card h3 { font-size: 15px; font-weight: 700; color: #1a1a2e; margin-bottom: 16px; }

/* Toast */
#toast {
  position: fixed; bottom: 24px; right: 24px; background: #1a1a2e; color: #fff;
  padding: 10px 18px; border-radius: 8px; font-size: 13px; font-weight: 500;
  opacity: 0; transform: translateY(8px); transition: all .25s; z-index: 300; pointer-events: none;
}
#toast.show { opacity: 1; transform: translateY(0); }

/* Scrollbar */
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 4px; }
::-webkit-scrollbar-track { background: transparent; }

.section-title { font-size: 11px; font-weight: 700; color: #9ca3af; text-transform: uppercase; letter-spacing: .6px; margin: 12px 4px 6px; }
.divider { height: 1px; background: #e5e7eb; margin: 12px 0; }
</style>
</head>
<body>

<!-- Login -->
<div id="login-screen">
  <div class="login-card">
    <div class="login-logo">🤖</div>
    <h2>Nuswalab Bot</h2>
    <p>Login untuk mengakses dashboard</p>
    <div class="form-field">
      <label>Username</label>
      <input type="text" id="login-user" value="admin" autocomplete="username">
    </div>
    <div class="form-field">
      <label>Password</label>
      <input type="password" id="login-pass" placeholder="Password" autocomplete="current-password">
    </div>
    <button class="btn-primary" onclick="doLogin()">Masuk</button>
  </div>
</div>

<!-- App -->
<div id="app" style="display:none">

  <!-- Sidebar -->
  <div id="sidebar">
    <div class="sidebar-header">
      <div class="logo-icon">🤖</div>
      <div>
        <h1>Nuswa<span>Bot</span></h1>
        <p>WhatsApp AI Dashboard</p>
      </div>
    </div>

    <div class="sidebar-tabs">
      <button class="stab active" onclick="switchTab('chat',this)">💬 Chat</button>
      <button class="stab" onclick="switchTab('wa',this)">📱 WA</button>
      <button class="stab" onclick="switchTab('kb',this)">📚 KB</button>
      <button class="stab" onclick="switchTab('settings',this)">⚙️</button>
    </div>

    <div id="sidebar-content">

      <!-- Chat tab -->
      <div id="tab-chat">
        <input type="text" id="search-box" placeholder="Cari kontak..." oninput="filterConvs(this.value)">
        <div id="stats-bar" class="stats-bar">
          <div class="stat-card"><div class="stat-n" id="s-contacts">0</div><div class="stat-l">Kontak</div></div>
          <div class="stat-card"><div class="stat-n" id="s-messages">0</div><div class="stat-l">Pesan</div></div>
          <div class="stat-card"><div class="stat-n" id="s-wa">0</div><div class="stat-l">WA</div></div>
        </div>
        <div id="conv-list"></div>
      </div>

      <!-- WA tab -->
      <div id="tab-wa" style="display:none">
        <div class="section-title">Akun WhatsApp</div>
        <div id="wa-list"></div>
        <button class="btn btn-blue btn-sm" onclick="openAddWA()" style="width:100%;margin-top:8px">+ Tambah Akun WA</button>
      </div>

      <!-- KB tab -->
      <div id="tab-kb" style="display:none">
        <div class="section-title">Knowledge Base</div>
        <div id="kb-list"></div>
        <button class="btn btn-blue btn-sm" onclick="openAddKB()" style="width:100%;margin-top:8px">+ Tambah Knowledge</button>
      </div>

      <!-- Settings tab -->
      <div id="tab-settings" style="display:none">
        <div class="section-title">Pengaturan Bot</div>
        <div id="settings-form"></div>
      </div>

    </div>
  </div>

  <!-- Main -->
  <div id="main">

    <!-- Empty -->
    <div id="empty-state">
      <div class="empty-icon">💬</div>
      <p>Pilih percakapan untuk mulai</p>
    </div>

    <!-- Chat view (hidden until selected) -->
    <div id="chat-view" style="display:none;flex-direction:column;flex:1;overflow:hidden">
      <div id="chat-header">
        <div id="chat-avatar">?</div>
        <div>
          <div id="chat-name">-</div>
          <div id="chat-phone">-</div>
        </div>
        <div class="header-actions">
          <span class="toggle-label">AI</span>
          <label class="toggle">
            <input type="checkbox" id="ai-toggle" onchange="toggleAI(this.checked)">
            <span class="toggle-slider"></span>
          </label>
          <button class="btn btn-outline btn-sm" onclick="openRightPanel('media')">🖼 Media</button>
        </div>
      </div>
      <div id="messages-area"></div>
      <div id="input-area">
        <textarea id="msg-input" placeholder="Ketik pesan..." rows="1" oninput="autoResize(this)" onkeydown="onReplyKey(event)"></textarea>
        <button id="send-btn" onclick="sendReply()">➤</button>
      </div>
    </div>

  </div>

  <!-- Right panel -->
  <div id="right-panel">
    <div class="panel-header">
      <h3 id="panel-title">Panel</h3>
      <button class="btn-icon" onclick="closeRightPanel()">✕</button>
    </div>
    <div class="panel-body" id="panel-body"></div>
  </div>

</div>

<!-- QR Modal -->
<div id="qr-modal">
  <div class="qr-card">
    <h3 id="qr-session-name">Scan QR</h3>
    <p>Buka WhatsApp → Perangkat Tertaut → Tautkan Perangkat</p>
    <img id="qr-img" src="" alt="QR Code" style="display:none">
    <div id="pairing-code-box" style="display:none"></div>
    <div id="qr-status" style="font-size:12px;color:#6b7280;margin:8px 0">Menunggu QR...</div>
    <button class="btn btn-outline btn-sm" onclick="closeQR()" style="margin-top:12px">Tutup</button>
  </div>
</div>

<!-- Generic Modal -->
<div id="modal-overlay">
  <div class="modal-card">
    <h3 id="modal-title"></h3>
    <div id="modal-body"></div>
    <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:16px">
      <button class="btn btn-outline btn-sm" onclick="closeModal()">Batal</button>
      <button class="btn btn-blue btn-sm" id="modal-confirm">Simpan</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div id="toast"></div>

<script>
const BASE = '/bot-api';
let TOKEN = localStorage.getItem('nuswalab_token') || '';
let currentPhone = '', currentSession = '', allConvs = [];
let pollTimer = null, qrPollTimer = null;

async function api(path, opts = {}) {
  const headers = { 'Authorization': 'Bearer ' + TOKEN, ...((opts.body && !(opts.body instanceof FormData)) ? { 'Content-Type': 'application/json' } : {}), ...(opts.headers || {}) };
  const res = await fetch(BASE + '/api' + path, { ...opts, headers });
  if (res.status === 401) { logout(); return null; }
  return res.json().catch(() => null);
}

async function doLogin() {
  const u = document.getElementById('login-user').value;
  const p = document.getElementById('login-pass').value;
  try {
    const res = await fetch(BASE + '/api/auth/login', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ username: u, password: p }) });
    const data = await res.json();
    if (data.token) {
      TOKEN = data.token;
      localStorage.setItem('nuswalab_token', TOKEN);
      document.getElementById('login-screen').style.display = 'none';
      document.getElementById('app').style.display = 'flex';
      init();
    } else {
      showToast('Login gagal: ' + (data.error || 'Cek username/password'));
    }
  } catch(e) { showToast('Gagal terhubung ke server'); }
}

function logout() {
  TOKEN = ''; localStorage.removeItem('nuswalab_token');
  location.reload();
}

document.getElementById('login-pass').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });

function init() {
  if (!TOKEN) return;
  loadStats();
  loadConvs();
  loadWaAccounts();
  loadKBSide();
  loadSettingsPanel();
  clearInterval(pollTimer);
  pollTimer = setInterval(() => { loadConvs(true); loadStats(); loadWaAccounts(); }, 5000);
}

if (TOKEN) {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app').style.display = 'flex';
  init();
}

// ── Stats ────────────────────────────────────────────────────────────────────
async function loadStats() {
  const d = await api('/stats');
  if (!d) return;
  document.getElementById('s-contacts').textContent = d.contacts || 0;
  document.getElementById('s-messages').textContent = d.messages || 0;
  document.getElementById('s-wa').textContent = d.wa_accounts || 0;
}

// ── Conversations ────────────────────────────────────────────────────────────
async function loadConvs(silent = false) {
  const d = await api('/conversations');
  if (!d) return;
  allConvs = d;
  if (!silent) renderConvs(allConvs);
  else renderConvs(allConvs, true);
}

function renderConvs(list, keepActive = false) {
  const el = document.getElementById('conv-list');
  if (!list.length) { el.innerHTML = '<div style="text-align:center;color:#9ca3af;font-size:12px;padding:20px">Belum ada percakapan</div>'; return; }
  el.innerHTML = list.map(c => {
    const initials = (c.name || c.phone || '?').substring(0,2).toUpperCase();
    const isActive = c.phone === currentPhone;
    const paused = c.bot_paused ? '<span class="conv-paused">⏸ Paused</span>' : '';
    return '<div class="conv-item' + (isActive ? ' active' : '') + '" onclick="openChat(\'' + esc(c.phone) + '\',\'' + esc(c.name || c.phone) + '\',\'' + esc(c.wa_session || '') + '\')">' +
      '<div class="conv-avatar">' + initials + '</div>' +
      '<div class="conv-info">' +
        '<div class="conv-name">' + esc(c.name || c.phone) + '</div>' +
        '<div class="conv-preview">' + esc(c.last_message || '') + '</div>' +
      '</div>' +
      '<div class="conv-meta">' +
        '<div class="conv-time">' + (c.last_message_at ? formatTime(c.last_message_at) : '') + '</div>' +
        paused +
      '</div>' +
    '</div>';
  }).join('');
}

function filterConvs(q) {
  const filtered = allConvs.filter(c => (c.name||'').toLowerCase().includes(q.toLowerCase()) || c.phone.includes(q));
  renderConvs(filtered);
}

async function openChat(phone, name, session) {
  currentPhone = phone; currentSession = session;
  document.getElementById('empty-state').style.display = 'none';
  const cv = document.getElementById('chat-view'); cv.style.display = 'flex';
  document.getElementById('chat-avatar').textContent = (name||phone).substring(0,2).toUpperCase();
  document.getElementById('chat-name').textContent = name || phone;
  document.getElementById('chat-phone').textContent = phone;
  renderConvs(allConvs);
  // set AI toggle
  const conv = allConvs.find(c => c.phone === phone);
  document.getElementById('ai-toggle').checked = !(conv && conv.bot_paused);
  await loadMessages();
}

async function loadMessages() {
  if (!currentPhone) return;
  const d = await api('/messages/' + encodeURIComponent(currentPhone));
  if (!d) return;
  const el = document.getElementById('messages-area');
  el.innerHTML = d.map(m => {
    const isOut = m.direction === 'out';
    return '<div class="bubble-wrap ' + (isOut ? 'out' : 'in') + '">' +
      '<div class="bubble ' + (isOut ? 'out' : 'in') + '">' +
        esc(m.body) +
        '<div class="bubble-time">' + formatTime(m.created_at) + '</div>' +
      '</div>' +
    '</div>';
  }).join('');
  el.scrollTop = el.scrollHeight;
}

async function sendReply() {
  const msg = document.getElementById('msg-input').value.trim();
  if (!msg || !currentPhone) return;
  document.getElementById('msg-input').value = '';
  autoResize(document.getElementById('msg-input'));
  const session = currentSession || (allConvs.find(c => c.phone === currentPhone) || {}).wa_session || '';
  await api('/send', { method: 'POST', body: JSON.stringify({ session_name: session, phone: currentPhone, message: msg }) });
  await loadMessages();
}

function onReplyKey(e) { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendReply(); } }

function autoResize(el) { el.style.height = 'auto'; el.style.height = Math.min(el.scrollHeight, 120) + 'px'; }

async function toggleAI(enabled) {
  if (!currentPhone) return;
  await api('/contacts/' + encodeURIComponent(currentPhone) + '/pause', { method: 'POST', body: JSON.stringify({ paused: !enabled }) });
  showToast(enabled ? 'AI aktif' : 'AI dijeda');
  await loadConvs(true);
}

// ── WA Accounts ───────────────────────────────────────────────────────────────
async function loadWaAccounts() {
  const d = await api('/wa');
  if (!d) return;
  const el = document.getElementById('wa-list');
  if (!d.length) { el.innerHTML = '<div style="text-align:center;color:#9ca3af;font-size:12px;padding:16px">Belum ada akun WA</div>'; return; }
  el.innerHTML = d.map(w => {
    const dot = w.runtime_status === 'connected' ? 'connected' : (w.runtime_status === 'connecting' ? 'connecting' : '');
    return '<div class="wa-item">' +
      '<div class="wa-dot ' + dot + '"></div>' +
      '<div>' +
        '<div class="wa-name">' + esc(w.label || w.session_name) + '</div>' +
        '<div class="wa-phone">' + (w.phone ? w.phone : w.runtime_status) + '</div>' +
      '</div>' +
      '<div class="wa-actions">' +
        (w.hasQr || w.runtime_status === 'connecting' ? '<button class="btn btn-sm btn-outline" onclick="showQR(\'' + esc(w.session_name) + '\')">QR</button>' : '') +
        '<button class="btn btn-sm btn-outline" onclick="restartWA(\'' + esc(w.session_name) + '\')">↺</button>' +
        '<button class="btn btn-sm btn-red" onclick="deleteWA(\'' + esc(w.session_name) + '\')">✕</button>' +
      '</div>' +
    '</div>';
  }).join('');
}

function openAddWA() {
  document.getElementById('modal-title').textContent = 'Tambah Akun WA';
  document.getElementById('modal-body').innerHTML =
    '<div class="form-group"><label>Session Name</label><input type="text" id="wa-session" placeholder="misal: nuswalab1"></div>' +
    '<div class="form-group"><label>Label</label><input type="text" id="wa-label" placeholder="Nama tampilan"></div>' +
    '<div class="form-group"><label>Nomor HP (untuk pairing code, opsional)</label><input type="text" id="wa-phone" placeholder="628xxxxxxxxxx"></div>';
  document.getElementById('modal-confirm').onclick = addWA;
  document.getElementById('modal-overlay').classList.add('open');
}

async function addWA() {
  const session_name = document.getElementById('wa-session').value.trim();
  const label = document.getElementById('wa-label').value.trim();
  const pairing_phone = document.getElementById('wa-phone').value.trim();
  if (!session_name) return showToast('Session name wajib diisi');
  closeModal();
  await api('/wa', { method: 'POST', body: JSON.stringify({ session_name, label, pairing_phone: pairing_phone || null }) });
  showToast('Akun ditambahkan');
  await loadWaAccounts();
  if (pairing_phone) { setTimeout(() => showQR(session_name), 3000); }
  else { setTimeout(() => showQR(session_name), 2000); }
}

async function deleteWA(session) {
  if (!confirm('Hapus akun ' + session + '?')) return;
  await api('/wa/' + encodeURIComponent(session), { method: 'DELETE' });
  showToast('Akun dihapus');
  await loadWaAccounts();
}

async function restartWA(session) {
  await api('/wa/' + encodeURIComponent(session) + '/restart', { method: 'POST' });
  showToast('Restart...');
  setTimeout(loadWaAccounts, 3000);
}

// ── QR ────────────────────────────────────────────────────────────────────────
let qrSession = '';
function showQR(session) {
  qrSession = session;
  document.getElementById('qr-session-name').textContent = 'Scan QR: ' + session;
  document.getElementById('qr-img').style.display = 'none';
  document.getElementById('pairing-code-box').style.display = 'none';
  document.getElementById('qr-status').textContent = 'Menunggu QR...';
  document.getElementById('qr-modal').classList.add('open');
  clearInterval(qrPollTimer);
  qrPollTimer = setInterval(pollQR, 2000);
  pollQR();
}

async function pollQR() {
  const d = await api('/wa/' + encodeURIComponent(qrSession) + '/qr');
  if (!d) return;
  if (d.qr) {
    document.getElementById('qr-img').src = d.qr;
    document.getElementById('qr-img').style.display = 'block';
    document.getElementById('pairing-code-box').style.display = 'none';
    document.getElementById('qr-status').textContent = 'Scan QR dengan WhatsApp';
  } else if (d.pairingCode) {
    document.getElementById('pairing-code-box').textContent = d.pairingCode;
    document.getElementById('pairing-code-box').style.display = 'block';
    document.getElementById('qr-img').style.display = 'none';
    document.getElementById('qr-status').textContent = 'Masukkan kode ini di WhatsApp';
  }
  const wa = (await api('/wa') || []).find(w => w.session_name === qrSession);
  if (wa && wa.runtime_status === 'connected') {
    clearInterval(qrPollTimer);
    document.getElementById('qr-status').textContent = '✅ Terhubung!';
    setTimeout(closeQR, 1500);
    loadWaAccounts();
  }
}

function closeQR() {
  clearInterval(qrPollTimer);
  document.getElementById('qr-modal').classList.remove('open');
}

// ── Tab switcher ──────────────────────────────────────────────────────────────
function switchTab(name, btn) {
  ['chat','wa','kb','settings'].forEach(t => {
    document.getElementById('tab-' + t).style.display = t === name ? '' : 'none';
  });
  document.querySelectorAll('.stab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  if (name === 'kb') loadKBSide();
  if (name === 'wa') loadWaAccounts();
  if (name === 'settings') loadSettingsPanel();
}

// ── Knowledge Base ────────────────────────────────────────────────────────────
async function loadKBSide() {
  const d = await api('/knowledge');
  if (!d) return;
  const el = document.getElementById('kb-list');
  if (!d.length) { el.innerHTML = '<div style="text-align:center;color:#9ca3af;font-size:12px;padding:16px">Belum ada knowledge</div>'; return; }
  el.innerHTML = d.map(k => {
    const badge = k.active ? '<span class="kb-badge on">ON</span>' : '<span class="kb-badge off">OFF</span>';
    return '<div class="kb-item">' +
      '<div class="kb-item-header">' +
        '<div class="kb-item-title">' + esc(k.title) + '</div>' +
        '<div style="display:flex;gap:4px;align-items:center">' +
          badge +
          '<button class="btn-icon" onclick="toggleKB(' + k.id + ',' + k.active + ')">⏯</button>' +
          '<button class="btn-icon" onclick="openEditKB(' + k.id + ')">✏️</button>' +
          '<button class="btn-icon" onclick="deleteKB(' + k.id + ')">🗑</button>' +
        '</div>' +
      '</div>' +
      '<div class="kb-item-preview">' + esc((k.content || '').substring(0, 100)) + '</div>' +
    '</div>';
  }).join('');
}

function openAddKB() {
  document.getElementById('modal-title').textContent = 'Tambah Knowledge';
  document.getElementById('modal-body').innerHTML =
    '<div class="form-group"><label>Judul</label><input type="text" id="kb-title" placeholder="Judul topik"></div>' +
    '<div class="form-group"><label>Konten</label><textarea id="kb-content" rows="8" placeholder="Isi knowledge base..."></textarea></div>';
  document.getElementById('modal-confirm').onclick = saveKB;
  document.getElementById('modal-overlay').classList.add('open');
}

async function saveKB() {
  const title = document.getElementById('kb-title').value.trim();
  const content = document.getElementById('kb-content').value.trim();
  if (!title || !content) return showToast('Judul dan konten wajib diisi');
  closeModal();
  await api('/knowledge', { method: 'POST', body: JSON.stringify({ title, content }) });
  showToast('Knowledge ditambahkan');
  loadKBSide();
}

async function toggleKB(id, current) {
  await api('/knowledge/' + id, { method: 'PUT', body: JSON.stringify({ active: current ? 0 : 1 }) });
  loadKBSide();
}

async function deleteKB(id) {
  if (!confirm('Hapus knowledge ini?')) return;
  await api('/knowledge/' + id, { method: 'DELETE' });
  showToast('Dihapus');
  loadKBSide();
}

function openEditKB(id) {
  api('/knowledge').then(d => {
    const k = (d || []).find(x => x.id === id);
    if (!k) return;
    document.getElementById('modal-title').textContent = 'Edit Knowledge';
    document.getElementById('modal-body').innerHTML =
      '<div class="form-group"><label>Judul</label><input type="text" id="kb-edit-title" value="' + esc(k.title) + '"></div>' +
      '<div class="form-group"><label>Konten</label><textarea id="kb-edit-content" rows="8">' + esc(k.content) + '</textarea></div>';
    document.getElementById('modal-confirm').onclick = () => saveKBEdit(id);
    document.getElementById('modal-overlay').classList.add('open');
  });
}

async function saveKBEdit(id) {
  const title = document.getElementById('kb-edit-title').value.trim();
  const content = document.getElementById('kb-edit-content').value.trim();
  closeModal();
  await api('/knowledge/' + id, { method: 'PUT', body: JSON.stringify({ title, content }) });
  showToast('Tersimpan');
  loadKBSide();
}

// ── Settings ─────────────────────────────────────────────────────────────────
async function loadSettingsPanel() {
  const d = await api('/settings');
  if (!d) return;
  const el = document.getElementById('settings-form');
  el.innerHTML =
    '<div class="form-group"><label>Bot Name</label><input type="text" id="s-bot_name" value="' + esc(d.bot_name || 'NuswaBot') + '"></div>' +
    '<div class="form-group"><label>System Prompt</label><textarea id="s-system_prompt" rows="4">' + esc(d.system_prompt || '') + '</textarea></div>' +
    '<div class="divider"></div>' +
    '<div class="section-title">Sumopod AI</div>' +
    '<div class="form-group"><label>Sumopod Key 1</label><input type="password" id="s-sumopod_key1" placeholder="sk-..." value="' + esc(d.sumopod_key1 || '') + '"></div>' +
    '<div class="form-group"><label>Sumopod Key 2 (backup)</label><input type="password" id="s-sumopod_key2" placeholder="sk-..." value="' + esc(d.sumopod_key2 || '') + '"></div>' +
    '<div class="form-group"><label>Sumopod Base URL</label><input type="text" id="s-sumopod_base_url" value="' + esc(d.sumopod_base_url || 'https://ai.sumopod.com') + '"></div>' +
    '<div class="form-group"><label>Model</label><input type="text" id="s-sumopod_model" value="' + esc(d.sumopod_model || 'gemini/gemini-2.5-flash') + '"></div>' +
    '<div class="divider"></div>' +
    '<div class="section-title">Anthropic (fallback)</div>' +
    '<div class="form-group"><label>Anthropic Key</label><input type="password" id="s-anthropic_key" placeholder="sk-ant-..." value="' + esc(d.anthropic_key || '') + '"></div>' +
    '<button class="btn btn-blue btn-sm" onclick="saveSettings()" style="width:100%">Simpan Pengaturan</button>' +
    '<div class="divider"></div>' +
    '<button class="btn btn-outline btn-sm" onclick="openRightPanel(\'media\')" style="width:100%">🖼 Kelola Media</button>';
}

async function saveSettings() {
  const fields = ['bot_name','system_prompt','sumopod_key1','sumopod_key2','sumopod_base_url','sumopod_model','anthropic_key'];
  const body = {};
  for (const f of fields) {
    const el = document.getElementById('s-' + f);
    if (el) body[f] = el.value;
  }
  await api('/settings', { method: 'POST', body: JSON.stringify(body) });
  showToast('Pengaturan tersimpan ✓');
}

// ── Right Panel ───────────────────────────────────────────────────────────────
function openRightPanel(type) {
  document.getElementById('right-panel').classList.add('open');
  if (type === 'media') loadMediaPanel();
}

function closeRightPanel() {
  document.getElementById('right-panel').classList.remove('open');
}

async function loadMediaPanel() {
  document.getElementById('panel-title').textContent = 'Media Library';
  const d = await api('/media');
  const body = document.getElementById('panel-body');
  body.innerHTML =
    '<div style="margin-bottom:12px">' +
      '<input type="file" id="media-file" accept="image/*,video/*,.pdf,.doc,.docx" style="font-size:12px;margin-bottom:8px;width:100%">' +
      '<button class="btn btn-blue btn-sm" onclick="uploadMedia()" style="width:100%">Upload File</button>' +
    '</div>' +
    '<div class="section-title">File tersimpan (' + ((d||[]).length) + ')</div>' +
    '<div class="media-grid">' +
    (d||[]).map(m => {
      const isImg = (m.mimetype || '').startsWith('image/');
      const thumb = isImg ? '<img class="media-thumb" src="/uploads/' + esc(m.filename) + '" onerror="this.style.display=\'none\'">' : '<div class="media-thumb" style="display:flex;align-items:center;justify-content:center;font-size:24px">📄</div>';
      return '<div class="media-card">' +
        thumb +
        '<button class="media-delete" onclick="deleteMedia(' + m.id + ')">✕</button>' +
        '<div class="media-info"><div class="media-name">' + esc(m.original_name || m.filename) + '</div>' +
        '<div style="font-size:10px;color:#9ca3af">ID:' + m.id + ' | [SEND_MEDIA:' + m.id + ']</div></div>' +
      '</div>';
    }).join('') +
    '</div>';
}

async function uploadMedia() {
  const fileEl = document.getElementById('media-file');
  if (!fileEl.files.length) return showToast('Pilih file terlebih dahulu');
  const fd = new FormData();
  fd.append('file', fileEl.files[0]);
  const res = await fetch(BASE + '/api/media', { method: 'POST', headers: { 'Authorization': 'Bearer ' + TOKEN }, body: fd });
  const data = await res.json().catch(() => ({}));
  if (data.ok) { showToast('File terupload ✓'); loadMediaPanel(); }
  else showToast('Upload gagal');
}

async function deleteMedia(id) {
  if (!confirm('Hapus file ini?')) return;
  await api('/media/' + id, { method: 'DELETE' });
  showToast('File dihapus');
  loadMediaPanel();
}

// ── Modal ─────────────────────────────────────────────────────────────────────
function closeModal() { document.getElementById('modal-overlay').classList.remove('open'); }
document.getElementById('modal-overlay').addEventListener('click', e => { if (e.target === e.currentTarget) closeModal(); });

// ── Toast ─────────────────────────────────────────────────────────────────────
let toastTimer;
function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2500);
}

// ── Helpers ───────────────────────────────────────────────────────────────────
function esc(s) {
  if (s == null) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

function formatTime(ts) {
  if (!ts) return '';
  try {
    const d = new Date(ts);
    const now = new Date();
    const diff = now - d;
    if (diff < 60000) return 'baru saja';
    if (diff < 3600000) return Math.floor(diff/60000) + ' mnt lalu';
    if (diff < 86400000) return d.toLocaleTimeString('id', { hour: '2-digit', minute: '2-digit' });
    return d.toLocaleDateString('id', { day: 'numeric', month: 'short' });
  } catch(e) { return ''; }
}
